<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WA Bot Dashboard</title>
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f8fafc;
            --primary: #22c55e;
            --secondary: #3b82f6;
            --muted: #64748b;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 2rem;
        }
        .container {
            max-width: 800px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }
        header {
            text-align: center;
        }
        h1 { margin: 0; font-weight: 800; }
        .status-badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.875rem;
            font-weight: 600;
            background: var(--muted);
            margin-top: 0.5rem;
        }
        .status-ready { background: var(--primary); }
        .card {
            background: var(--card-bg);
            border-radius: 1rem;
            padding: 1.5rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        #qr-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 250px;
            background: #fff;
            border-radius: 0.5rem;
        }
        #qr-code { max-width: 100%; }
        #log-container {
            background: #000;
            border-radius: 0.5rem;
            padding: 1rem;
            height: 300px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 0.875rem;
            color: #4ade80;
        }
        .log-entry { margin-bottom: 0.25rem; }
        .controls {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-top: 1rem;
        }
        .btn {
            background: var(--secondary);
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .btn:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn:active { transform: translateY(0); }
        .btn-off { background: var(--muted); }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>WhatsApp AI Bot</h1>
            <div style="display: flex; flex-direction: column; align-items: center; gap: 0.5rem;">
                <div id="status" class="status-badge">Disconnected</div>
                <div class="controls">
                    <button id="toggle-btn" class="btn">
                        <span id="toggle-icon">🟢</span>
                        <span id="toggle-text">Bot Enabled</span>
                    </button>
                </div>
            </div>
        </header>

        <section class="card">
            <h2>Scan QR Code</h2>
            <div id="qr-container">
                <p style="color: #64748b">Waiting for QR code...</p>
                <img id="qr-code" style="display:none">
            </div>
        </section>

        <section class="card">
            <h2>Live Logs</h2>
            <div id="log-container"></div>
        </section>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const statusEl = document.getElementById('status');
        const qrCodeEl = document.getElementById('qr-code');
        const qrPlaceholder = document.querySelector('#qr-container p');
        const logContainer = document.getElementById('log-container');

        socket.on('status', (status) => {
            statusEl.textContent = status;
            if (status === 'Ready' || status === 'Authenticated') {
                statusEl.classList.add('status-ready');
            } else {
                statusEl.classList.remove('status-ready');
            }
        });

        const toggleBtn = document.getElementById('toggle-btn');
        const toggleIcon = document.getElementById('toggle-icon');
        const toggleText = document.getElementById('toggle-text');
        let currentBotStatus = true;

        function updateToggleUI(enabled) {
            currentBotStatus = enabled;
            if (enabled) {
                toggleBtn.classList.remove('btn-off');
                toggleIcon.textContent = '🟢';
                toggleText.textContent = 'Bot Enabled';
            } else {
                toggleBtn.classList.add('btn-off');
                toggleIcon.textContent = '🔴';
                toggleText.textContent = 'Bot Disabled';
            }
        }

        socket.on('bot-status', (enabled) => {
            updateToggleUI(enabled);
        });

        toggleBtn.addEventListener('click', async () => {
            try {
                const res = await fetch('/api/toggle-bot', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ enabled: !currentBotStatus })
                });
                const data = await res.json();
                updateToggleUI(data.enabled);
            } catch (err) {
                console.error('Failed to toggle bot:', err);
            }
        });

        socket.on('qr', (url) => {
            qrCodeEl.src = url;
            qrCodeEl.style.display = 'block';
            qrPlaceholder.style.display = 'none';
        });

        socket.on('log', (msg) => {
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.textContent = `> ${msg}`;
            logContainer.appendChild(entry);
            logContainer.scrollTop = logContainer.scrollHeight;
        });
    </script>
</body>
</html>
